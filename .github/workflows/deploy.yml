name: CI/CD Simulation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-deploy-simulation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m py_compile data_analysis.py lambda_function.py upload_to_azurite.py

      - name: Confirm dataset exists
        run: ls -lh All_Diets.csv

      - name: Run data analysis with real dataset
        env:
          DIET_DATASET_PATH: All_Diets.csv
          OUTPUT_DIR: outputs
        run: python data_analysis.py

      - name: Build Docker image
        run: docker build -t diet-analysis .

      - name: Run Docker container with real dataset
        run: docker run --rm diet-analysis

      - name: Upload generated analysis outputs
        uses: actions/upload-artifact@v4
        with:
          name: analysis-outputs
          path: outputs/
